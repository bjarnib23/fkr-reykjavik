fkr_booking.submit:
  path: '/api/fkr/booking'
  defaults:
    _controller: '\Drupal\fkr_booking\Controller\BookingController::submit'
  methods: [POST, OPTIONS]
  requirements:
    _access: 'TRUE'

fkr_booking.admin_list:
  path: '/admin/fkr/bookings'
  defaults:
    _controller: '\Drupal\fkr_booking\Controller\BookingController::adminList'
    _title: 'Bookings'
  requirements:
    _permission: 'access administration pages'

fkr_booking.booking_details:
  path: '/admin/fkr/bookings/{node}'
  defaults:
    _controller: '\Drupal\fkr_booking\Controller\BookingController::bookingDetails'
    _title: Booking
  requirements:
    _permission: 'access administration pages'
    node: \d+

fkr_booking.update_status:
  path: '/admin/fkr/bookings/{node}/status'
  defaults:
    _controller: '\Drupal\fkr_booking\Controller\BookingController::updateStatus'
  methods: [POST]
  requirements:
    _permission: 'access administration pages'
    node: \d+

fkr_booking.availability_api:
  path: '/api/fkr/availability'
  defaults:
    _controller: '\Drupal\fkr_booking\Controller\AvailabilityController::getAvailability'
  methods: [GET, OPTIONS]
  requirements:
    _access: 'TRUE'

fkr_booking.availability_toggle:
  path: '/api/fkr/availability/toggle'
  defaults:
    _controller: '\Drupal\fkr_booking\Controller\AvailabilityController::toggleSlot'
  methods: [POST, OPTIONS]
  requirements:
    _permission: 'access administration pages'

fkr_booking.availability_admin:
  path: '/admin/fkr/availability'
  defaults:
    _controller: '\Drupal\fkr_booking\Controller\AvailabilityController::adminCalendar'
    _title: 'Availability'
  requirements: 
    _permission: 'access administration pages'